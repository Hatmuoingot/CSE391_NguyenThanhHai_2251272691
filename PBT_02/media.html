<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm & Đa phương tiện</title>
    <style>
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
        figure {
            border: 1px solid #ccc;
            padding: 10px;
            max-width: 400px;
            margin-bottom: 20px;
        }
        figcaption { font-style: italic; text-align: center; margin-top: 10px; }
        section { margin-bottom: 40px; }
    </style>
</head>
<body>
    <header>
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" xmlns="http://www.w3.org/2000/svg" aria-label="Logo Công ty">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <h1>Bộ Sưu Tập Sản Phẩm</h1>
    </header>

    <main>
        <section>
            <h2>1. Hình ảnh Nổi bật</h2>
            
            <figure>
                <img src="https://aozoom.com.vn/storage/uploads/product/MINI%20H4/H%C3%ACnh%20PNG/h4%206.png" alt="Đèn Bi-LED mini trợ sáng gắn xe máy" loading="lazy">
                <figcaption>Đèn Bi-LED mini nâng cấp ánh sáng cho Honda Vision</figcaption>
            </figure>

            <figure>
                <img src="https://down-vn.img.susercontent.com/file/sg-11134253-7rdwu-mdluu78u4bf8ea" alt="Dây dắt mèo cưng đi dạo công viên" loading="lazy">
                <figcaption>Dây dắt an toàn chống thắt cổ cho mèo cưng</figcaption>
            </figure>

            <figure>
                <img src="https://file.sanphamvnpt.vn/1654075448_ew12st.png" alt="Bộ khuếch đại Mesh Node iGate" loading="lazy">
                <figcaption>Mesh Node iGate EW12ST mở rộng vùng phủ sóng WiFi</figcaption>
            </figure>
        </section>

        <section>
            <h2>2. Video Đánh giá</h2>
            
            <h3>Video nhúng (YouTube)</h3>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/2jz0tjOxZVw?si=qkuzDtD6YqdBfFuI" title="Video đánh giá sản phẩm" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

            <h3>Video trực tiếp (HTML5)</h3>
            <video controls width="560" poster="https://bieberguitar.weebly.com/uploads/4/1/2/5/4125363/9691933.png?504" preload="metadata">
                <source src="demo-video.webm" type="video/webm">
                <source src="that should be me.mp4" type="video/mp4">
                <p>Trình duyệt của bạn không hỗ trợ thẻ video HTML5. Xin hãy <a href="demo-video.mp4">tải video về máy</a>.</p>
            </video>
        </section>

        <section>
            <h2>3. Âm thanh Giới thiệu</h2>
            <audio controls preload="none">
                <source src="intro-audio.ogg" type="audio/ogg">
                <source src="FAVELA.mp3" type="audio/mpeg">
                <p>Trình duyệt của bạn không hỗ trợ thẻ audio HTML5.</p>
            </audio>
        </section>
    </main>
</body>
</html>
